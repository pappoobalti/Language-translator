<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Translator - GitHub Pages</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .credentials-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 30px;
            color: white;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover {
            background: #45a049;
        }

        .language-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            align-items: center;
        }

        select {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        .swap-btn {
            background: #667eea;
            padding: 10px 20px;
        }

        .translation-area {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .translation-area {
                grid-template-columns: 1fr;
            }
            .language-selector {
                flex-direction: column;
            }
        }

        textarea {
            width: 100%;
            height: 250px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
        }

        .output-box {
            background: #f5f5f5;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            min-height: 250px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .loading {
            text-align: center;
            padding: 20px;
            display: none;
        }

        .alert {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            display: none;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .reset-btn {
            background: #dc3545;
            margin-left: 10px;
        }

        .reset-btn:hover {
            background: #c82333;
        }

        .info-text {
            font-size: 12px;
            color: #666;
            margin-top: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🌐 Azure Translator</h1>
            
            <div id="alert" class="alert"></div>

            <!-- Credentials Section -->
            <div id="credentialsSection" class="credentials-section">
                <h3>🔐 Enter Your Azure Credentials</h3>
                <p style="margin-bottom: 20px;">Your API key is stored only in your browser</p>
                
                <div class="input-group">
                    <label>🔑 Azure API Key</label>
                    <input type="password" id="apiKey" placeholder="Enter your Azure API key">
                </div>
                
                <div class="input-group">
                    <label>📍 Azure Region</label>
                    <input type="text" id="region" placeholder="e.g., eastus, westeurope, global">
                </div>
                
                <button id="saveBtn">💾 Save Credentials</button>
            </div>

            <!-- Translator Section -->
            <div id="translatorSection" style="display: none;">
                <div class="language-selector">
                    <select id="sourceLang">
                        <option value="en">🇺🇸 English</option>
                        <option value="es">🇪🇸 Spanish</option>
                        <option value="fr">🇫🇷 French</option>
                        <option value="de">🇩🇪 German</option>
                        <option value="it">🇮🇹 Italian</option>
                        <option value="ja">🇯🇵 Japanese</option>
                        <option value="ko">🇰🇷 Korean</option>
                        <option value="zh-Hans">🇨🇳 Chinese (Simplified)</option>
                        <option value="ar">🇸🇦 Arabic</option>
                        <option value="ru">🇷🇺 Russian</option>
                        <option value="hi">🇮🇳 Hindi</option>
                        <option value="pt">🇵🇹 Portuguese</option>
                    </select>
                    
                    <button id="swapBtn" class="swap-btn">🔄 Swap</button>
                    
                    <select id="targetLang">
                        <option value="es">🇪🇸 Spanish</option>
                        <option value="en">🇺🇸 English</option>
                        <option value="fr">🇫🇷 French</option>
                        <option value="de">🇩🇪 German</option>
                        <option value="it">🇮🇹 Italian</option>
                        <option value="ja">🇯🇵 Japanese</option>
                        <option value="ko">🇰🇷 Korean</option>
                        <option value="zh-Hans">🇨🇳 Chinese (Simplified)</option>
                        <option value="ar">🇸🇦 Arabic</option>
                        <option value="ru">🇷🇺 Russian</option>
                        <option value="hi">🇮🇳 Hindi</option>
                        <option value="pt">🇵🇹 Portuguese</option>
                    </select>
                </div>

                <div class="translation-area">
                    <div>
                        <textarea id="inputText" placeholder="Enter text to translate... (Ctrl+Enter to translate)"></textarea>
                        <div class="button-group">
                            <button id="clearBtn">🗑️ Clear</button>
                            <button id="pasteBtn">📋 Paste</button>
                        </div>
                    </div>
                    <div>
                        <div class="output-box" id="outputText"></div>
                        <div class="button-group">
                            <button id="copyBtn">📋 Copy</button>
                        </div>
                    </div>
                </div>

                <div id="loadingIndicator" class="loading">
                    <div>🔄 Translating... Please wait</div>
                </div>

                <button id="translateBtn" style="width: 100%; background: #667eea; font-size: 18px;">🚀 Translate Now</button>
                <button id="resetBtn" class="reset-btn" style="width: 100%; margin-top: 10px;">🔄 Reset Credentials</button>
                
                <div class="info-text">
                    💡 Tip: Press Ctrl+Enter to translate quickly
                </div>
            </div>
        </div>
    </div>

    <script>
        // Check for saved credentials
        let savedApiKey = localStorage.getItem('azure_api_key');
        let savedRegion = localStorage.getItem('azure_region');

        // Initialize UI
        if (savedApiKey && savedRegion) {
            document.getElementById('credentialsSection').style.display = 'none';
            document.getElementById('translatorSection').style.display = 'block';
        }

        // Show alert function
        function showAlert(message, type) {
            const alertDiv = document.getElementById('alert');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = message;
            alertDiv.style.display = 'block';
            setTimeout(() => {
                alertDiv.style.display = 'none';
            }, 3000);
        }

        // Save credentials
        document.getElementById('saveBtn').addEventListener('click', () => {
            const apiKey = document.getElementById('apiKey').value.trim();
            const region = document.getElementById('region').value.trim();
            
            if (!apiKey || !region) {
                showAlert('Please enter both API Key and Region', 'error');
                return;
            }
            
            localStorage.setItem('azure_api_key', apiKey);
            localStorage.setItem('azure_region', region);
            
            document.getElementById('credentialsSection').style.display = 'none';
            document.getElementById('translatorSection').style.display = 'block';
            showAlert('✅ Credentials saved successfully!', 'success');
        });

        // Reset credentials
        document.getElementById('resetBtn').addEventListener('click', () => {
            localStorage.removeItem('azure_api_key');
            localStorage.removeItem('azure_region');
            document.getElementById('credentialsSection').style.display = 'block';
            document.getElementById('translatorSection').style.display = 'none';
            document.getElementById('apiKey').value = '';
            document.getElementById('region').value = '';
            showAlert('🔄 Credentials reset', 'success');
        });

        // Translate function
        document.getElementById('translateBtn').addEventListener('click', async () => {
            const text = document.getElementById('inputText').value.trim();
            const sourceLang = document.getElementById('sourceLang').value;
            const targetLang = document.getElementById('targetLang').value;
            const apiKey = localStorage.getItem('azure_api_key');
            const region = localStorage.getItem('azure_region');
            
            if (!text) {
                showAlert('Please enter text to translate', 'error');
                return;
            }
            
            if (!apiKey || !region) {
                showAlert('Please save your API credentials first', 'error');
                return;
            }
            
            // Show loading
            document.getElementById('loadingIndicator').style.display = 'block';
            document.getElementById('outputText').innerHTML = '';
            
            try {
                const url = `https://api.cognitive.microsofttranslator.com/translate?api-version=3.0&to=${targetLang}&from=${sourceLang}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Ocp-Apim-Subscription-Key': apiKey,
                        'Ocp-Apim-Subscription-Region': region,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify([{ Text: text }])
                });
                
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || 'Translation failed');
                }
                
                const data = await response.json();
                const translatedText = data[0].translations[0].text;
                
                document.getElementById('outputText').innerHTML = translatedText;
                showAlert('✅ Translation complete!', 'success');
            } catch (error) {
                console.error('Error:', error);
                showAlert('❌ Translation failed: ' + error.message, 'error');
                document.getElementById('outputText').innerHTML = 'Translation failed. Please check your credentials and try again.';
            } finally {
                document.getElementById('loadingIndicator').style.display = 'none';
            }
        });

        // Swap languages
        document.getElementById('swapBtn').addEventListener('click', () => {
            const sourceLang = document.getElementById('sourceLang').value;
            const targetLang = document.getElementById('targetLang').value;
            document.getElementById('sourceLang').value = targetLang;
            document.getElementById('targetLang').value = sourceLang;
            showAlert('🔄 Languages swapped', 'success');
        });

        // Clear input
        document.getElementById('clearBtn').addEventListener('click', () => {
            document.getElementById('inputText').value = '';
            document.getElementById('outputText').innerHTML = '';
            showAlert('🧹 Cleared', 'success');
        });

        // Paste from clipboard
        document.getElementById('pasteBtn').addEventListener('click', async () => {
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('inputText').value = text;
                showAlert('📋 Text pasted from clipboard', 'success');
            } catch (err) {
                showAlert('❌ Could not paste. Please use Ctrl+V', 'error');
            }
        });

        // Copy output
        document.getElementById('copyBtn').addEventListener('click', () => {
            const outputText = document.getElementById('outputText').innerHTML;
            if (outputText && outputText !== 'Translation failed. Please check your credentials and try again.') {
                navigator.clipboard.writeText(outputText);
                showAlert('📋 Translation copied to clipboard!', 'success');
            } else {
                showAlert('Nothing to copy', 'error');
            }
        });

        // Ctrl+Enter to translate
        document.getElementById('inputText').addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('translateBtn').click();
            }
        });
    </script>
</body>
</html>
